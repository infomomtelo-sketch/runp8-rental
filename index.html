<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RunP8</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.chat {
  max-width:480px;
  margin:0 auto;
  padding:20px;
}

.msg {
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.btn {
  display:block;
  margin:6px 0;
  padding:10px;
  background:#2563eb;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<script>

let selectedProperty = null;

const chat = document.getElementById("chat");

/* UI */

function addMsg(text) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = text;
  chat.appendChild(div);
}

function clearButtons() {
  document.querySelectorAll(".btn").forEach(b => b.remove());
}

function addButton(label, action) {
  const btn = document.createElement("div");
  btn.className = "btn";
  btn.innerText = label;
  btn.onclick = action;
  chat.appendChild(btn);
}

/* STATIC DATA (NO STORAGE = NO BREAKS) */

const properties = [
  { title:"2BR Apartment", price:1800, location:"Hanford" },
  { title:"Studio Unit", price:1200, location:"Lemoore" }
];

/* FLOW */

function start() {
  addMsg("Available properties:");

  properties.forEach(p => {
    addMsg(p.title + " - $" + p.price + " - " + p.location);

    addButton("Request Showing", () => {
      selectedProperty = p;
      startShowing();
    });
  });
}

function startShowing() {
  clearButtons();

  addMsg("You selected:");
  addMsg(selectedProperty.title + " - $" + selectedProperty.price);

  addMsg("When do you plan to move in?");

  addButton("ASAP", nextStep);
  addButton("30 days", nextStep);
  addButton("Flexible", nextStep);
}

function nextStep() {
  clearButtons();

  addMsg("You're pre-approved.");
  addMsg("Choose a showing time:");

  addButton("Friday 4PM", finish);
  addButton("Saturday 10AM", finish);
  addButton("Sunday 2PM", finish);
}

function finish() {
  clearButtons();

  addMsg("Showing scheduled.");
  addMsg("Apply now?");

  addButton("Apply", apply);
  addButton("Not now", () => addMsg("No problem."));
}

function apply() {
  clearButtons();

  addMsg("You're approved.");
  addMsg("Welcome to your new home.");
}

/* START */

start();

</script>

</body>
</html>
