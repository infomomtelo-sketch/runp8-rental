<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Add Property | RunP8</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      padding: 24px 16px;
    }
    .wrap {
      max-width: 680px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p.sub {
      margin: 0 0 20px;
      color: #cbd5e1;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
      color: #cbd5e1;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #334155;
      background: #0f172a;
      color: #ffffff;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .btn {
      margin-top: 18px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      padding: 14px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #0f172a;
      color: #cbd5e1;
      min-height: 24px;
      white-space: pre-line;
    }
    .topnav {
      max-width: 680px;
      margin: 0 auto 16px;
    }
    .topnav a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="topnav">
    <a href="/">← Back to RunP8</a>
  </div>

  <div class="wrap">
    <h1>Add Property</h1>
    <p class="sub">Submit a property to your RunP8 rental flow.</p>

    <label for="title">Property Title</label>
    <input id="title" placeholder="Example: 2BR Apartment" />

    <label for="price">Monthly Rent</label>
    <input id="price" placeholder="Example: 1800" />

    <label for="location">Location</label>
    <input id="location" placeholder="Example: Hanford" />

    <label for="desc">Description</label>
    <textarea id="desc" placeholder="Add a short description..."></textarea>

    <button class="btn" id="saveBtn" onclick="saveProperty()">Submit Property</button>

    <div class="status" id="status">Ready.</div>
  </div>

  <script>
    const API_BASE = "https://runp8-kv-api.infomomtelo.workers.dev";

    async function saveProperty() {
      const saveBtn = document.getElementById("saveBtn");
      const status = document.getElementById("status");

      const property = {
        title: document.getElementById("title").value.trim(),
        price: document.getElementById("price").value.trim(),
        location: document.getElementById("location").value.trim(),
        desc: document.getElementById("desc").value.trim()
      };

      if (!property.title || !property.price || !property.location) {
        status.innerText = "Please fill in title, price, and location.";
        return;
      }

      saveBtn.disabled = true;
      status.innerText = "Saving property...";

      try {
        const res = await fetch(API_BASE + "/add", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(property)
        });

        const result = await res.json();

        if (!res.ok) {
          throw new Error(result.error || "Failed to save property.");
        }

        status.innerText = "Property saved successfully.";

        document.getElementById("title").value = "";
        document.getElementById("price").value = "";
        document.getElementById("location").value = "";
        document.getElementById("desc").value = "";
      } catch (err) {
        status.innerText = "Error: " + err.message;
      } finally {
        saveBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
